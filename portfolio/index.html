<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制作物一覧 | Kasukuzu Portfolio</title>
    <meta name="description" content="Kasukuzu Portfolioの制作物一覧ページです。現在公開中のWebアプリやツールをまとめて掲載しています。">
    <style>
        :root {
            --bg-1: #edf7ff;
            --bg-2: #fff6ea;
            --ink: #213449;
            --muted: #627589;
            --line: #dde7f0;
            --brand: #168fc8;
            --brand-deep: #0d5f8f;
            --accent: #ff8d63;
            --card: rgba(255, 255, 255, 0.88);
            --shadow: 0 18px 45px rgba(25, 65, 102, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans CJK JP", "Helvetica Neue", Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(22, 143, 200, 0.14), transparent 24%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .shell {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 56px;
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 36px;
        }

        .brand {
            font-size: 20px;
            font-weight: 900;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav a,
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 800;
            transition: transform 0.18s ease;
        }

        .nav a {
            color: var(--brand-deep);
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--line);
        }

        .button {
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--brand));
            box-shadow: 0 12px 24px rgba(22, 143, 200, 0.18);
        }

        .nav a:hover,
        .button:hover,
        .project-card:hover {
            transform: translateY(-2px);
        }

        .page-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 20px;
            margin-bottom: 22px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            margin: 0 0 12px;
            padding: 6px 12px;
            color: var(--brand-deep);
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(22, 143, 200, 0.16);
            border-radius: 999px;
            font-size: 14px;
            font-weight: 800;
        }

        h1 {
            margin: 0;
            font-size: 42px;
            line-height: 1.08;
        }

        .lead {
            max-width: 700px;
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.8;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 18px;
            margin-top: 26px;
        }

        .project-card {
            display: grid;
            gap: 16px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.74);
            border-radius: 8px;
            background: var(--card);
            box-shadow: var(--shadow);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .card-visual {
            min-height: 180px;
            border-radius: 8px;
            border: 1px solid #ebf1f6;
            background:
                linear-gradient(145deg, rgba(22, 143, 200, 0.18), transparent 34%),
                linear-gradient(320deg, rgba(255, 141, 99, 0.18), transparent 44%),
                linear-gradient(180deg, #ffffff, #f5f9fc);
            position: relative;
            overflow: hidden;
        }

        .card-visual::before {
            content: "Japan Roulette";
            position: absolute;
            left: 18px;
            top: 18px;
            color: #0f6f9f;
            font-size: 16px;
            font-weight: 900;
        }

        .card-visual::after {
            content: "";
            position: absolute;
            right: 24px;
            bottom: 24px;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffb24f, #ff785f);
            box-shadow: 0 12px 24px rgba(255, 120, 95, 0.22);
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 4px 10px;
            color: var(--brand-deep);
            background: #f1f9fd;
            border: 1px solid #e1eef6;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
        }

        h2 {
            margin: 0;
            font-size: 26px;
        }

        .project-card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.8;
        }

        .card-link {
            color: var(--brand);
            font-weight: 900;
        }

        @media (max-width: 820px) {
            .shell {
                width: min(100% - 20px, 760px);
                padding-top: 18px;
            }

            .site-header,
            .page-head {
                flex-direction: column;
                align-items: flex-start;
            }

            h1 {
                font-size: 34px;
            }

            .lead {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="site-header">
            <div class="brand">Kasukuzu Portfolio</div>
            <nav class="nav" aria-label="Primary">
                <a href="/">トップ</a>
                <a href="/portfolio/randtravelapp">日本ルーレット</a>
            </nav>
        </header>

        <main>
            <section class="page-head" aria-labelledby="page-title">
                <div>
                    <p class="eyebrow">Projects</p>
                    <h1 id="page-title">制作物一覧</h1>
                    <p class="lead">Kasukuzu Portfolioで公開している制作物一覧です。現時点では、日本全国の旅先をランダムに決められる「日本ルーレット」を掲載しています。</p>
                </div>
                <a class="button" href="/">トップへ戻る</a>
            </section>

            <section class="project-grid" aria-label="Project list">
                <a class="project-card" href="/portfolio/randtravelapp">
                    <div class="card-visual"></div>
                    <div class="card-meta">
                        <span class="tag">Web App</span>
                        <span class="tag">Travel</span>
                        <span class="tag">Portfolio</span>
                    </div>
                    <div>
                        <h2>日本ルーレット</h2>
                        <p>都道府県の絞り込み、未訪問のみ抽選、履歴表示、多言語UIに対応した旅先決定アプリです。次の旅行先を気軽に決めたいときに使えます。</p>
                    </div>
                    <div class="card-link">/portfolio/randtravelapp</div>
                </a>
            </section>
        </main>
    </div>
</body>
</html>
