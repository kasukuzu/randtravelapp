<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本ルーレット - 次の旅行先をランダムに決める旅先アプリ（多言語対応）</title>
    <meta name="description" content="ボタンを押すだけで次の旅行先をランダムに決めてくれるウェブアプリ。日本全国47都道府県から次の旅先を選びます。">
    <meta name="google-site-verification" content="_YLvHOdaYUf1zwGIUFaaJeymHz46BV3idQYOsHu7A8Y" />
    <style>
        :root {
            --bg-sky: #eaf7ff;
            --bg-sun: #fff4df;
            --bg-mint: #edf9f1;
            --card: rgba(255, 255, 255, 0.92);
            --card-strong: #ffffff;
            --ink: #243447;
            --muted: #627386;
            --line: #dce6ef;
            --brand: #1d9bd1;
            --brand-deep: #1469b3;
            --accent: #ff8a63;
            --accent-deep: #e85e48;
            --mint: #23b886;
            --gold: #f8bb34;
            --shadow: 0 18px 45px rgba(29, 74, 118, 0.16);
            --soft-shadow: 0 10px 25px rgba(29, 74, 118, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans CJK JP", "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            background:
                linear-gradient(135deg, var(--bg-sky) 0%, var(--bg-sun) 48%, var(--bg-mint) 100%);
            padding: 24px 0 40px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.55), rgba(255,255,255,0)),
                repeating-linear-gradient(135deg, rgba(255,255,255,0.22) 0 1px, transparent 1px 18px);
            opacity: 0.55;
        }

        .container {
            position: relative;
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            text-align: center;
        }

        h1, h2, p {
            margin-top: 0;
        }

        .hero-panel,
        .result-card,
        .map-panel,
        #filters,
        .history-panel {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: 8px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .hero-panel {
            position: relative;
            overflow: hidden;
            padding: 26px;
            text-align: left;
        }

        .hero-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, rgba(29, 155, 209, 0.14), transparent 38%),
                linear-gradient(300deg, rgba(255, 138, 99, 0.16), transparent 42%);
            pointer-events: none;
        }

        .hero-panel > * {
            position: relative;
        }

        .top-controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .language-control {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 700;
        }

        #language-select {
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--ink);
            font: inherit;
            padding: 7px 34px 7px 12px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(29, 74, 118, 0.08);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 10px;
            padding: 6px 10px;
            color: #0d6d8f;
            background: rgba(232, 248, 255, 0.9);
            border: 1px solid rgba(29, 155, 209, 0.18);
            border-radius: 999px;
            font-size: 14px;
            font-weight: 800;
        }

        h1 {
            margin-bottom: 10px;
            color: var(--ink);
            font-size: 44px;
            line-height: 1.08;
        }

        #lead-text {
            max-width: 960px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.7;
        }

        .map-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }

        .button,
        .mini-button,
        .icon-button {
            border: none;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease, background 0.18s ease;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 48px;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--brand));
            padding: 13px 24px;
            border-radius: 999px;
            box-shadow: 0 14px 28px rgba(29, 155, 209, 0.28);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(29, 155, 209, 0.34);
            filter: saturate(1.06);
        }

        .button:active {
            transform: translateY(0) scale(0.98);
        }

        .button:disabled {
            background: #b8c5d2;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .button.secondary {
            background: linear-gradient(135deg, #19b88f, #1d9bd1);
            box-shadow: 0 12px 24px rgba(35, 184, 134, 0.24);
        }

        .button.warm {
            background: linear-gradient(135deg, #ffb84a, #ff765e);
            box-shadow: 0 12px 24px rgba(255, 118, 94, 0.24);
        }

        .button.ghost {
            color: var(--brand-deep);
            background: #f3fbff;
            border: 1px solid rgba(29, 155, 209, 0.22);
            box-shadow: none;
        }

        .mode-toggle {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 46px;
            padding: 8px 14px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid var(--line);
            border-radius: 999px;
            box-shadow: var(--soft-shadow);
            font-weight: 800;
        }

        .mode-toggle input {
            width: 18px;
            height: 18px;
            accent-color: var(--mint);
        }

        .result-card {
            position: relative;
            overflow: hidden;
            margin-top: 18px;
            padding: 24px;
            min-height: 210px;
            text-align: left;
        }

        .result-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(115deg, rgba(255, 184, 74, 0.18), transparent 36%),
                linear-gradient(300deg, rgba(29, 155, 209, 0.16), transparent 46%);
            pointer-events: none;
        }

        .result-card > * {
            position: relative;
        }

        .result-status {
            margin: 0 0 10px;
            color: var(--accent-deep);
            font-size: 15px;
            font-weight: 900;
        }

        .result-label {
            margin: 0 0 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .result-prefecture {
            margin: 0;
            color: var(--ink);
            font-size: 40px;
            line-height: 1.15;
        }

        .result-subname {
            margin: 7px 0 0;
            color: #0d6d8f;
            font-weight: 800;
        }

        .result-blurb {
            max-width: 720px;
            margin: 14px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .result-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .result-actions[hidden] {
            display: none;
        }

        .copy-message {
            min-height: 22px;
            margin-top: 10px;
            color: var(--mint);
            font-size: 14px;
            font-weight: 800;
        }

        .result-card.is-result {
            animation: result-pop 0.55s ease both;
        }

        .result-card.is-spinning .result-prefecture::after {
            content: "";
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-left: 10px;
            border: 3px solid rgba(29, 155, 209, 0.20);
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        .map-and-filters-container {
            display: grid;
            grid-template-columns: minmax(360px, 1fr) 360px;
            gap: 18px;
            align-items: start;
            margin-top: 18px;
            width: 100%;
        }

        .map-panel {
            padding: 18px;
        }

        #japan-map {
            width: 100%;
            max-width: 560px;
            height: auto;
            margin: 0 auto;
            display: block;
            filter: drop-shadow(0 16px 18px rgba(29, 74, 118, 0.16));
        }

        #filters {
            width: 100%;
            max-height: 560px;
            overflow-y: auto;
            padding: 16px;
            text-align: left;
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        #filter-title,
        #history-title {
            margin: 0;
            font-size: 20px;
            color: var(--ink);
        }

        #filter-title {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .filter-actions {
            display: flex;
            flex: 0 0 auto;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .mini-button,
        .icon-button {
            min-height: 34px;
            padding: 7px 11px;
            color: var(--brand-deep);
            background: #f4fbff;
            border: 1px solid rgba(29, 155, 209, 0.22);
            border-radius: 999px;
        }

        .mini-button:hover,
        .icon-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(29, 74, 118, 0.12);
        }

        .selection-summary {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .region-filter {
            margin-bottom: 10px;
            text-align: left;
            border: 1px solid #e6eef5;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.78);
        }

        .region-filter summary {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            cursor: pointer;
            padding: 10px;
            list-style: none;
        }

        .region-filter summary::-webkit-details-marker {
            display: none;
        }

        .region-filter summary::before {
            content: '▶';
            font-size: 0.8em;
            transition: transform 0.2s;
            color: var(--brand);
        }

        .region-filter[open] > summary::before {
            transform: rotate(90deg);
        }

        .prefecture-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
            gap: 8px;
            padding: 0 10px 10px;
        }

        .prefecture-checkbox-item {
            display: grid;
            grid-template-columns: 18px 1fr auto;
            align-items: center;
            gap: 7px;
            min-height: 38px;
            padding: 7px;
            background: #ffffff;
            border: 1px solid #edf2f6;
            border-radius: 8px;
        }

        .prefecture-checkbox-item input {
            accent-color: var(--brand);
        }

        .prefecture-checkbox-item label {
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .prefecture-checkbox-item.is-visited label {
            color: #8492a2;
        }

        .visited-toggle {
            width: auto;
            min-width: 44px;
            min-height: 30px;
            padding: 0 8px;
            font-size: 12px;
        }

        .visited-toggle[aria-pressed="true"] {
            color: #fff;
            background: linear-gradient(135deg, var(--mint), #1d9bd1);
            border-color: transparent;
        }

        .prefecture {
            fill: #d5dee6;
            stroke: #ffffff;
            stroke-width: 0.8;
            transition: fill 0.16s ease, stroke 0.16s ease, opacity 0.16s ease, filter 0.16s ease;
        }

        .prefecture:hover {
            fill: #7dd7ef;
            filter: drop-shadow(0 0 7px rgba(29, 155, 209, 0.55));
        }

        .prefecture.is-targeted {
            fill: #8edfb6;
            stroke: #ffffff;
        }

        .prefecture.is-excluded {
            fill: #eef2f5;
            stroke: #dbe3ea;
            opacity: 0.58;
        }

        .prefecture.is-visited {
            stroke: #ff9f6d;
            stroke-width: 1.4;
        }

        .prefecture.flashing {
            fill: #36a6dd;
            filter: drop-shadow(0 0 12px rgba(54, 166, 221, 0.75));
        }

        .prefecture.selected {
            fill: var(--gold);
            stroke: #fff6cf;
            stroke-width: 1.8;
            filter: drop-shadow(0 0 16px rgba(248, 187, 52, 0.78));
            animation: selected-glow 1.2s ease-in-out infinite alternate;
        }

        .history-panel {
            margin-top: 18px;
            padding: 18px;
            text-align: left;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0 0;
            padding: 0;
            list-style: none;
        }

        .history-list li,
        .history-empty {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 7px 11px;
            color: var(--ink);
            background: #ffffff;
            border: 1px solid #e7eef5;
            border-radius: 999px;
            font-weight: 800;
        }

        .history-empty {
            color: var(--muted);
        }

        #affiliate-links-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
        }

        #affiliate-links-container:empty {
            display: none;
        }

        .affiliate-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 16px;
            color: #fff;
            background: linear-gradient(135deg, #ff8a63, #f05252);
            text-decoration: none;
            border-radius: 999px;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(240, 82, 82, 0.20);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .affiliate-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(240, 82, 82, 0.26);
        }

        @keyframes result-pop {
            0% { transform: translateY(10px) scale(0.98); opacity: 0.78; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes selected-glow {
            from { filter: drop-shadow(0 0 8px rgba(248, 187, 52, 0.50)); }
            to { filter: drop-shadow(0 0 18px rgba(248, 187, 52, 0.86)); }
        }

        @media (max-width: 900px) {
            body {
                padding: 16px 0 28px;
            }

            .container {
                width: min(100% - 20px, 680px);
            }

            .hero-panel,
            .result-card {
                padding: 20px;
            }

            .top-controls {
                justify-content: flex-start;
            }

            h1 {
                font-size: 32px;
            }

            #lead-text {
                font-size: 16px;
            }

            .result-actions {
                align-items: stretch;
            }

            .button,
            .mode-toggle {
                width: 100%;
            }

            .map-actions {
                align-items: stretch;
            }

            .result-prefecture {
                font-size: 32px;
            }

            .map-and-filters-container {
                grid-template-columns: 1fr;
            }

            .map-panel {
                order: 1;
            }

            #filters {
                order: 2;
                max-height: 360px;
            }

            .filter-header {
                flex-direction: column;
            }

            .filter-actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>

            kagoshima: {

            },
            okinawa: {

        const STORAGE_KEYS = {
            language: 'preferredLanguage',
            selectedPrefectures: 'selectedPrefectures',
            visitedPrefectures: 'visitedPrefectures',
            rouletteHistory: 'rouletteHistory',
            unvisitedOnly: 'unvisitedOnly'
        };
        const supportedLanguages = Object.keys(translations);
        const allPrefectures = Object.values(regions).flatMap(region => region.prefectures);
        const allPrefectureIds = allPrefectures.map(pref => pref.id);
        const startButton = document.getElementById('start-button');
        const detailsButton = document.getElementById('details-button');
        const hotelSearchButton = document.getElementById('hotel-search-button');
        const gourmetSearchButton = document.getElementById('gourmet-search-button');
        const shareButton = document.getElementById('share-button');
        const copyButton = document.getElementById('copy-button');
        const markVisitedButton = document.getElementById('mark-visited-button');
        const resultCard = document.getElementById('result-card');
        const resultDisplay = document.getElementById('result-display');
        const resultLabel = document.getElementById('result-label');
        const resultPrefecture = document.getElementById('result-prefecture');
        const resultSubname = document.getElementById('result-subname');
        const resultBlurb = document.getElementById('result-blurb');
        const resultActions = document.getElementById('result-actions');
        const copyMessage = document.getElementById('copy-message');
        const affiliateContainer = document.getElementById('affiliate-links-container');
        const filterListContainer = document.getElementById('filter-list');
        const languageSelect = document.getElementById('language-select');
        const languageLabel = document.getElementById('language-label');
        const heroKicker = document.getElementById('hero-kicker');
        const heading = document.getElementById('main-heading');
        const leadText = document.getElementById('lead-text');
        const filterTitle = document.getElementById('filter-title');
        const selectionSummary = document.getElementById('selection-summary');
        const selectAllButton = document.getElementById('select-all-button');
        const clearAllButton = document.getElementById('clear-all-button');
        const unvisitedOnlyToggle = document.getElementById('unvisited-only-toggle');
        const unvisitedOnlyLabel = document.getElementById('unvisited-only-label');
        const historyTitle = document.getElementById('history-title');
        const historyList = document.getElementById('history-list');
        const filterActionsGroup = document.querySelector('.filter-actions');
        const metaDescription = document.querySelector('meta[name="description"]');
        const mapTitle = document.getElementById('map-title');
        const mapDesc = document.getElementById('map-desc');
        const mapPaths = {};
        let currentLang = getStoredLanguage();
        let selectedPrefIds = loadStoredSet(STORAGE_KEYS.selectedPrefectures, allPrefectureIds);
        let visitedPrefIds = loadStoredSet(STORAGE_KEYS.visitedPrefectures, []);
        let rouletteHistory = loadStoredArray(STORAGE_KEYS.rouletteHistory).filter(id => allPrefectureIds.includes(id)).slice(0, 5);
        let unvisitedOnly = loadStoredBoolean(STORAGE_KEYS.unvisitedOnly, false);
        let resultState = 'idle';
        let resultMessageKey = 'noSelection';
        let lastResultPrefId = null;

        function readStorage(key) {
            try {
                return localStorage.getItem(key);
            } catch (error) {
                return null;
            }
        }

        function writeStorage(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (error) {
                // The app still works if localStorage is unavailable.
            }
        }

        function getStoredLanguage() {
            const storedLanguage = readStorage(STORAGE_KEYS.language);
            return supportedLanguages.includes(storedLanguage) ? storedLanguage : 'ja';
        }

        function saveStoredLanguage(lang) {
            writeStorage(STORAGE_KEYS.language, lang);
        }

        function loadStoredArray(key) {
            try {
                const parsed = JSON.parse(readStorage(key));
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                return [];
            }
        }

        function loadStoredSet(key, fallbackIds) {
            const rawValue = readStorage(key);
            if (rawValue === null) {
                return new Set(fallbackIds);
            }

            try {
                const parsed = JSON.parse(rawValue);
                if (!Array.isArray(parsed)) {
                    return new Set(fallbackIds);
                }
                return new Set(parsed.filter(id => allPrefectureIds.includes(id)));
            } catch (error) {
                return new Set(fallbackIds);
            }
        }

        function loadStoredBoolean(key, fallbackValue) {
            const rawValue = readStorage(key);
            if (rawValue === null) {
                return fallbackValue;
            }
            return rawValue === 'true';
        }

        function saveSelectedPrefectures() {
            writeStorage(STORAGE_KEYS.selectedPrefectures, JSON.stringify([...selectedPrefIds]));
        }

        function saveVisitedPrefectures() {
            writeStorage(STORAGE_KEYS.visitedPrefectures, JSON.stringify([...visitedPrefIds]));
        }

        function saveRouletteHistory() {
            writeStorage(STORAGE_KEYS.rouletteHistory, JSON.stringify(rouletteHistory));
        }

        function saveUnvisitedOnly() {
            writeStorage(STORAGE_KEYS.unvisitedOnly, String(unvisitedOnly));
        }

        function getLocalizedName(item) {
            return item.name[currentLang] || item.name.ja;
        }

        function getSecondaryName(pref) {
            return currentLang === 'en' ? pref.name.ja : pref.name.en;
        }

        function getLocalizedBlurb(pref) {
            const meta = prefectureMeta[pref.id];
            return meta?.blurb?.[currentLang] || meta?.blurb?.ja || '';
        }

        function findPrefecture(prefId) {
            return allPrefectures.find(pref => pref.id === prefId) || null;
        }

        function formatTemplate(template, values) {
            return Object.entries(values).reduce((text, [key, value]) => {
                return text.split(`{${key}}`).join(value);
            }, template);
        }

        function getAvailablePrefectures() {
            return allPrefectures.filter(pref => {
                const isSelected = selectedPrefIds.has(pref.id);
                const isVisited = visitedPrefIds.has(pref.id);
                return isSelected && (!unvisitedOnly || !isVisited);
            });
        }

        function updateMapStyles() {
            allPrefectures.forEach(pref => {
                const mapElement = mapPaths[pref.id] || document.querySelector(`#japan-map .${pref.id}`);
                if (!mapElement) {
                    return;
                }

                mapPaths[pref.id] = mapElement;
                const isSelected = selectedPrefIds.has(pref.id);
                const isVisited = visitedPrefIds.has(pref.id);
                const isEligible = isSelected && (!unvisitedOnly || !isVisited);
                mapElement.classList.toggle('is-targeted', isEligible);
                mapElement.classList.toggle('is-excluded', !isEligible);
                mapElement.classList.toggle('is-visited', isVisited);
            });
        }

        function updateSelectionSummary() {
            const selectedCount = selectedPrefIds.size;
            const visitedCount = visitedPrefIds.size;
            const eligibleCount = getAvailablePrefectures().length;
            selectionSummary.textContent = formatTemplate(translations[currentLang].selectionSummary, {
                selected: selectedCount,
                eligible: eligibleCount,
                visited: visitedCount
            });
        }

        function updateRegionCheckbox(regionId) {
            const region = regions[regionId];
            const regionCheckbox = document.getElementById(`region-${regionId}`);
            if (!region || !regionCheckbox) {
                return;
            }

            const regionPrefIds = region.prefectures.map(pref => pref.id);
            const allChecked = regionPrefIds.every(prefId => selectedPrefIds.has(prefId));
            const someChecked = regionPrefIds.some(prefId => selectedPrefIds.has(prefId));
            regionCheckbox.checked = allChecked;
            regionCheckbox.indeterminate = someChecked && !allChecked;
        }

        function createFilters() {
            const openRegions = new Map(
                Array.from(filterListContainer.querySelectorAll('.region-filter')).map(details => [details.dataset.region, details.open])
            );

            filterListContainer.innerHTML = '';

            for (const [regionId, region] of Object.entries(regions)) {
                const details = document.createElement('details');
                details.className = 'region-filter';
                details.dataset.region = regionId;
                details.open = openRegions.has(regionId) ? openRegions.get(regionId) : true;

                const summary = document.createElement('summary');
                const regionCheckbox = document.createElement('input');
                regionCheckbox.type = 'checkbox';
                regionCheckbox.id = `region-${regionId}`;
                regionCheckbox.dataset.region = regionId;
                
                const regionLabel = document.createElement('label');
                regionLabel.textContent = ` ${getLocalizedName(region)}`;
                regionLabel.htmlFor = regionCheckbox.id;

                summary.appendChild(regionCheckbox);
                summary.appendChild(regionLabel);

                const prefList = document.createElement('div');
                prefList.className = 'prefecture-list';

                region.prefectures.forEach(pref => {
                    const prefName = getLocalizedName(pref);
                    const isVisited = visitedPrefIds.has(pref.id);
                    const item = document.createElement('div');
                    item.className = 'prefecture-checkbox-item';
                    item.classList.toggle('is-visited', isVisited);

                    const prefCheckbox = document.createElement('input');
                    prefCheckbox.type = 'checkbox';
                    prefCheckbox.checked = selectedPrefIds.has(pref.id);
                    prefCheckbox.id = `pref-${pref.id}`;
                    prefCheckbox.dataset.id = pref.id;
                    prefCheckbox.dataset.region = regionId;

                    const prefLabel = document.createElement('label');
                    prefLabel.textContent = prefName;
                    prefLabel.htmlFor = prefCheckbox.id;

                    const visitedButton = document.createElement('button');
                    visitedButton.type = 'button';
                    visitedButton.className = 'icon-button visited-toggle';
                    visitedButton.textContent = isVisited ? translations[currentLang].visitedShort : translations[currentLang].unvisitedShort;
                    visitedButton.setAttribute('aria-pressed', String(isVisited));
                    visitedButton.setAttribute('aria-label', `${isVisited ? translations[currentLang].markUnvisitedButton : translations[currentLang].markVisitedButton}: ${prefName}`);
                    visitedButton.title = `${isVisited ? translations[currentLang].visitedShort : translations[currentLang].unvisitedShort}: ${prefName}`;
                    
                    item.appendChild(prefCheckbox);
                    item.appendChild(prefLabel);
                    item.appendChild(visitedButton);
                    prefList.appendChild(item);

                    const pathElement = document.querySelector(`#japan-map .${pref.id}`);
                    if (pathElement) {
                        mapPaths[pref.id] = pathElement;
                        pathElement.setAttribute('aria-label', prefName);
                    }

                    prefCheckbox.addEventListener('change', () => {
                        if (prefCheckbox.checked) {
                            selectedPrefIds.add(pref.id);
                        } else {
                            selectedPrefIds.delete(pref.id);
                        }
                        saveSelectedPrefectures();
                        updateRegionCheckbox(regionId);
                        updateMapStyles();
                        updateSelectionSummary();
                    });

                    visitedButton.addEventListener('click', () => {
                        toggleVisited(pref.id);
                    });
                });

                details.appendChild(summary);
                details.appendChild(prefList);
                filterListContainer.appendChild(details);
                updateRegionCheckbox(regionId);

                regionCheckbox.addEventListener('change', (event) => {
                    const isChecked = event.target.checked;
                    region.prefectures.forEach(pref => {
                        if (isChecked) {
                            selectedPrefIds.add(pref.id);
                        } else {
                            selectedPrefIds.delete(pref.id);
                        }
                    });
                    event.target.indeterminate = false;
                    saveSelectedPrefectures();
                    createFilters();
                    updateMapStyles();
                    updateSelectionSummary();
                });
            }

            updateMapTitles();
        }

        function updateMapTitles() {
            allPrefectures.forEach(pref => {
                const mapElement = mapPaths[pref.id] || document.querySelector(`#japan-map .${pref.id}`);
                if (!mapElement) {
                    return;
                }

                mapPaths[pref.id] = mapElement;
                mapElement.setAttribute('aria-label', getLocalizedName(pref));

                const titleElement = mapElement.querySelector('title');
                if (titleElement) {
                    titleElement.textContent = `${getLocalizedName(pref)} / ${pref.name.en}`;
                }
            });
        }

        function buildSearchUrl(pref, keyword) {
            const query = encodeURIComponent(`${getLocalizedName(pref)} ${keyword}`);
            return `https://www.google.com/search?q=${query}`;
        }

        function updateResultLinks(pref) {
            const t = translations[currentLang];
            const prefName = getLocalizedName(pref);
            detailsButton.href = buildSearchUrl(pref, t.searchKeyword);
            detailsButton.textContent = `🔎 ${t.detailsButton}`;
            detailsButton.title = `${t.detailsButton}: ${prefName}`;
            detailsButton.setAttribute('aria-label', `${t.detailsButton}: ${prefName}`);

            hotelSearchButton.href = buildSearchUrl(pref, t.hotelKeyword);
            hotelSearchButton.textContent = `🏨 ${t.hotelButton}`;
            hotelSearchButton.title = `${t.hotelButton}: ${prefName}`;
            hotelSearchButton.setAttribute('aria-label', `${t.hotelButton}: ${prefName}`);

            gourmetSearchButton.href = buildSearchUrl(pref, t.gourmetKeyword);
            gourmetSearchButton.textContent = `🍽 ${t.gourmetButton}`;
            gourmetSearchButton.title = `${t.gourmetButton}: ${prefName}`;
            gourmetSearchButton.setAttribute('aria-label', `${t.gourmetButton}: ${prefName}`);
        }

        function renderAffiliateLinks(pref) {
            affiliateContainer.innerHTML = '';
            if (!pref) {
                return;
            }

            const prefName = getLocalizedName(pref);
            const links = [
                {
                    href: 'https://px.a8.net/svt/ejp?a8mat=45C668+24SXTE+4ZCO+60OXE',
                    text: formatTemplate(translations[currentLang].yahooTravelButton, { pref: prefName })
                },
                {
                    href: 'https://px.a8.net/svt/ejp?a8mat=45C668+4OHOZ6+14CS+68EPE',
                    text: formatTemplate(translations[currentLang].jalanTravelButton, { pref: prefName })
                }
            ];

            links.forEach(linkInfo => {
                const link = document.createElement('a');
                link.href = linkInfo.href;
                link.textContent = linkInfo.text;
                link.target = '_blank';
                link.rel = 'noopener noreferrer nofollow';
                link.className = 'affiliate-button';
                affiliateContainer.appendChild(link);
            });
        }

        function setResultCardState(state) {
            resultCard.classList.remove('is-idle', 'is-spinning', 'is-result', 'is-error');
            resultCard.classList.add(`is-${state}`);
        }

        function renderResult() {
            const t = translations[currentLang];
            const resultPref = lastResultPrefId ? findPrefecture(lastResultPrefId) : null;
            resultActions.hidden = resultState !== 'result' || !resultPref;

            if (resultState === 'spinning') {
                setResultCardState('spinning');
                resultDisplay.textContent = t.spinning;
                resultLabel.textContent = t.resultPrefix;
                resultPrefecture.textContent = t.spinning;
                resultSubname.textContent = t.spinningSubtitle;
                resultBlurb.textContent = '';
                affiliateContainer.innerHTML = '';
                return;
            }

            if (resultState === 'error') {
                setResultCardState('error');
                resultDisplay.textContent = t[resultMessageKey] || t.noSelection;
                resultLabel.textContent = t.filterTitle;
                resultPrefecture.textContent = '!';
                resultSubname.textContent = '';
                resultBlurb.textContent = t[resultMessageKey] || t.noSelection;
                affiliateContainer.innerHTML = '';
                return;
            }

            if (resultState === 'result' && resultPref) {
                const prefName = getLocalizedName(resultPref);
                setResultCardState('result');
                resultDisplay.textContent = t.resultPrefix;
                resultLabel.textContent = t.resultPrefix;
                resultPrefecture.textContent = prefName;
                resultSubname.textContent = getSecondaryName(resultPref);
                resultBlurb.textContent = getLocalizedBlurb(resultPref);
                updateResultLinks(resultPref);
                markVisitedButton.textContent = visitedPrefIds.has(resultPref.id) ? `✓ ${t.markUnvisitedButton}` : `✓ ${t.markVisitedButton}`;
                markVisitedButton.setAttribute('aria-pressed', String(visitedPrefIds.has(resultPref.id)));
                shareButton.textContent = `↗ ${t.shareButton}`;
                copyButton.textContent = `⧉ ${t.copyButton}`;
                renderAffiliateLinks(resultPref);
                return;
            }

            setResultCardState('idle');
            resultDisplay.textContent = '';
            resultLabel.textContent = t.resultPrefix;
            resultPrefecture.textContent = t.resultPlaceholder;
            resultSubname.textContent = '';
            resultBlurb.textContent = t.resultHint;
            affiliateContainer.innerHTML = '';
        }

        function renderHistory() {
            const t = translations[currentLang];
            historyList.innerHTML = '';

            if (!rouletteHistory.length) {
                const emptyItem = document.createElement('li');
                emptyItem.className = 'history-empty';
                emptyItem.textContent = t.noHistory;
                historyList.appendChild(emptyItem);
                return;
            }

            rouletteHistory.forEach((prefId, index) => {
                const pref = findPrefecture(prefId);
                if (!pref) {
                    return;
                }

                const item = document.createElement('li');
                const prefix = index === 0 ? t.previousPrefix : `${index + 1}`;
                item.textContent = `${prefix}: ${getLocalizedName(pref)}`;
                historyList.appendChild(item);
            });
        }

        function updateTexts() {
            const t = translations[currentLang];
            document.documentElement.lang = currentLang;
            document.title = t.pageTitle;
            if (metaDescription) {
                metaDescription.setAttribute('content', t.description);
            }

            heading.textContent = t.heading;
            heroKicker.textContent = t.heroKicker;
            leadText.textContent = t.lead;
            filterTitle.textContent = t.filterTitle;
            languageLabel.textContent = t.languageLabel;
            languageSelect.value = currentLang;
            languageSelect.setAttribute('aria-label', t.languageLabel);
            languageSelect.title = t.languageLabel;
            startButton.textContent = `✈ ${t.startButton}`;
            selectAllButton.textContent = t.selectAll;
            clearAllButton.textContent = t.clearAll;
            unvisitedOnlyLabel.textContent = t.unvisitedOnly;
            unvisitedOnlyToggle.checked = unvisitedOnly;
            historyTitle.textContent = t.historyTitle;
            mapTitle.textContent = t.mapTitle;
            mapDesc.textContent = t.mapDescription;
            if (filterActionsGroup) {
                filterActionsGroup.setAttribute('aria-label', t.filterTitle);
            }

            createFilters();
            updateMapStyles();
            updateSelectionSummary();
            renderHistory();
            renderResult();
        }

        function setAllPrefectureSelection(isSelected) {
            selectedPrefIds = new Set(isSelected ? allPrefectureIds : []);
            saveSelectedPrefectures();
            createFilters();
            updateMapStyles();
            updateSelectionSummary();
        }

        function toggleVisited(prefId) {
            if (visitedPrefIds.has(prefId)) {
                visitedPrefIds.delete(prefId);
            } else {
                visitedPrefIds.add(prefId);
            }
            saveVisitedPrefectures();
            createFilters();
            updateMapStyles();
            updateSelectionSummary();
            renderResult();
        }

        function addToHistory(prefId) {
            rouletteHistory = [prefId, ...rouletteHistory].slice(0, 5);
            saveRouletteHistory();
            renderHistory();
        }

        function startRoulette() {
            const availablePrefectures = getAvailablePrefectures();

            if (availablePrefectures.length === 0) {
                resultState = 'error';
                resultMessageKey = selectedPrefIds.size === 0 ? 'noSelection' : 'noEligibleSelection';
                lastResultPrefId = null;
                copyMessage.textContent = '';
                document.querySelectorAll('.prefecture').forEach(p => p.classList.remove('selected', 'flashing'));
                renderResult();
                return;
            }

            startButton.disabled = true;
            affiliateContainer.innerHTML = '';
            copyMessage.textContent = '';
            resultState = 'spinning';
            lastResultPrefId = null;
            renderResult();
            
            document.querySelectorAll('.prefecture').forEach(p => {
                p.classList.remove('selected', 'flashing');
            });
            
            const duration = 2600;
            const interval = 48;
            let timer;
            
            const shuffledPrefectures = [...availablePrefectures].sort(() => Math.random() - 0.5);
            let currentIndex = 0;
            let lastPrefElement = null;
    
            timer = setInterval(() => {
                if (lastPrefElement) {
                    lastPrefElement.classList.remove('flashing');
                }
                
                const currentPrefId = shuffledPrefectures[currentIndex].id;
                const currentElement = mapPaths[currentPrefId];
                if (currentElement) {
                    currentElement.classList.add('flashing');
                    lastPrefElement = currentElement;
                }
    
                currentIndex = (currentIndex + 1) % shuffledPrefectures.length;
            }, interval);
    
            setTimeout(() => {
                clearInterval(timer);
                
                const randomIndex = Math.floor(Math.random() * availablePrefectures.length);
                const resultPref = availablePrefectures[randomIndex];
                
                if (lastPrefElement) {
                    lastPrefElement.classList.remove('flashing');
                }
    
                const resultElement = mapPaths[resultPref.id];
                if (resultElement) {
                    resultElement.classList.add('selected');
                }

                resultState = 'result';
                lastResultPrefId = resultPref.id;
                addToHistory(resultPref.id);
                renderResult();
                
                startButton.disabled = false;
    
            }, duration);
        }

        function getShareMessage(pref) {
            return formatTemplate(translations[currentLang].shareText, { pref: getLocalizedName(pref) });
        }

        function getShareText(pref) {
            return `${getShareMessage(pref)} ${location.href}`;
        }

        async function copyText(text) {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.setAttribute('readonly', '');
            textArea.style.position = 'fixed';
            textArea.style.opacity = '0';
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
        }

        async function copyCurrentResult() {
            const pref = lastResultPrefId ? findPrefecture(lastResultPrefId) : null;
            if (!pref) {
                return;
            }

            try {
                await copyText(getShareText(pref));
                copyMessage.textContent = translations[currentLang].copySuccess;
            } catch (error) {
                copyMessage.textContent = translations[currentLang].copyFailure;
            }
        }

        async function shareCurrentResult() {
            const pref = lastResultPrefId ? findPrefecture(lastResultPrefId) : null;
            if (!pref) {
                return;
            }

            const text = getShareText(pref);
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: translations[currentLang].heading,
                        text: getShareMessage(pref),
                        url: location.href
                    });
                    return;
                } catch (error) {
                    if (error.name === 'AbortError') {
                        return;
                    }
                }
            }

            await copyCurrentResult();
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateTexts();
            startButton.addEventListener('click', startRoulette);
            selectAllButton.addEventListener('click', () => setAllPrefectureSelection(true));
            clearAllButton.addEventListener('click', () => setAllPrefectureSelection(false));
            unvisitedOnlyToggle.addEventListener('change', (event) => {
                unvisitedOnly = event.target.checked;
                saveUnvisitedOnly();
                updateMapStyles();
                updateSelectionSummary();
            });
            markVisitedButton.addEventListener('click', () => {
                if (lastResultPrefId) {
                    toggleVisited(lastResultPrefId);
                }
            });
            shareButton.addEventListener('click', shareCurrentResult);
            copyButton.addEventListener('click', copyCurrentResult);
            languageSelect.addEventListener('change', (event) => {
                if (!supportedLanguages.includes(event.target.value)) {
                    return;
                }

                currentLang = event.target.value;
                saveStoredLanguage(currentLang);
                updateTexts();
            });
        });
    </script>
</body>
</html>
